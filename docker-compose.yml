version: "3.8"

services:
  db:
    image: postgres:17.5
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ivanramosz/smartecbot-posts:1.0.0
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${server_port:-8080}:${server_port:-8080}"
    restart: unless-stopped

volumes:
  db_data:
    driver: local
