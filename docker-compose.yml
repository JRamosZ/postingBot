version: "3.8"

services:
  db:
    image: postgres:17.5
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    image: ivanramosz/smartecbot-posts:1.0.0
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "${server_port:-8080}:${server_port:-8080}"
    restart: unless-stopped

volumes:
  db_data:
    driver: local
